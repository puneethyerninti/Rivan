<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c3a28" />
    <title>Rivan Realty Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Poppins, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(116, 188, 154, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(184, 154, 90, 0.12), transparent 24%),
          linear-gradient(180deg, #f5fbf8 0%, #edf4ef 100%);
        color: #1f2d24;
      }

      .offline-card {
        width: min(100%, 420px);
        padding: 32px 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(184, 154, 90, 0.14);
        box-shadow: 0 24px 80px rgba(22, 52, 38, 0.12);
        text-align: center;
      }

      img {
        width: 68px;
        height: 68px;
        object-fit: contain;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
        color: #1c3a28;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #58655e;
      }
    </style>
  </head>
  <body>
    <main class="offline-card">
      <img src="/pwa-192.png" alt="Rivan Realty" />
      <h1>You're offline</h1>
      <p>Rivan Realty will reconnect automatically. Previously loaded pages and app assets remain available while your connection returns.</p>
    </main>
  </body>
  </html>
